<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      name="description"
      content="Contact ChatGo for feedback, ideas, and partnership requests."
    />
    <title>ChatGo | Contact Us</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Syne:wght@500;700;800&family=Space+Grotesk:wght@400;500;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="./styles.css" />
    <link rel="icon" type="image/png" href="./img/favicon.png" />
    <link rel="apple-touch-icon" href="./img/favicon.png" />
  </head>
  <body>
    <div class="ambient ambient-top"></div>
    <div class="ambient ambient-bottom"></div>

    <header class="site-header reveal">
      <a href="./index.html" class="brand" aria-label="ChatGo home">
        <img class="brand-logo" src="./img/logo/indexLogo.png" alt="ChatGo" />
      </a>
      <nav class="site-nav" aria-label="Primary">
        <a href="./index.html#what-is-chatgo">What It Is</a>
        <a href="./android.html">Android App</a>
        <a href="./how-to.html">How To Use</a>
        <a href="./contact.html" aria-current="page">Contact Us</a>
      </nav>
      <a class="btn btn-outline" href="./android.html">Get App For Android</a>
    </header>

    <main>
      <section class="hero reveal">
        <p class="kicker">Contact</p>
        <h1>Contact ChatGo</h1>
        <p class="hero-copy">
          Send feedback, feature ideas, or partnership requests. We read every message.
        </p>
        <div class="hero-actions">
          <a class="btn btn-primary" href="./index.html">Back To Homepage</a>
          <a class="btn btn-outline" href="./how-to.html">Open Tutorials</a>
        </div>
      </section>

      <section class="contact-section reveal" aria-label="Contact form">
        <form class="contact-form" id="contact-form">
          <label for="contact-name">Name</label>
          <input id="contact-name" name="name" type="text" required />

          <label for="contact-email">Email</label>
          <input id="contact-email" name="email" type="email" required />

          <label for="contact-object">Object</label>
          <input id="contact-object" name="object" type="text" required />

          <label for="contact-message">Message</label>
          <textarea id="contact-message" name="message" rows="6" required></textarea>

          <button class="btn btn-primary" type="submit">Send Message</button>
          <div id="form-status" class="form-status" aria-live="polite"></div>
        </form>
      </section>
    </main>

    <footer class="site-footer reveal">
      <p>ChatGo</p>
      <a href="./index.html">Homepage</a>
      <a href="./android.html">Get App For Android</a>
      <a href="./how-to.html">How To Use</a>
      <a class="social-link instagram-link" href="https://www.instagram.com/chatgo_tourism?igsh=anB2eDV4ZXRpM3I0" target="_blank" rel="noopener noreferrer" aria-label="ChatGo on Instagram">
        <svg class="social-icon" viewBox="0 0 24 24" aria-hidden="true" focusable="false">
          <path d="M7.8 2h8.4A5.8 5.8 0 0 1 22 7.8v8.4a5.8 5.8 0 0 1-5.8 5.8H7.8A5.8 5.8 0 0 1 2 16.2V7.8A5.8 5.8 0 0 1 7.8 2Zm0 1.9A3.9 3.9 0 0 0 3.9 7.8v8.4a3.9 3.9 0 0 0 3.9 3.9h8.4a3.9 3.9 0 0 0 3.9-3.9V7.8a3.9 3.9 0 0 0-3.9-3.9H7.8Zm8.95 1.45a1.3 1.3 0 1 1 0 2.6 1.3 1.3 0 0 1 0-2.6ZM12 6.85A5.15 5.15 0 1 1 6.85 12 5.15 5.15 0 0 1 12 6.85Zm0 1.9A3.25 3.25 0 1 0 15.25 12 3.25 3.25 0 0 0 12 8.75Z" />
        </svg>
        <span>Instagram</span>
      </a>
      <a class="social-link play-link" href="https://play.google.com/store/apps/details?id=com.chatgorn" target="_blank" rel="noopener noreferrer" aria-label="ChatGo on Google Play">
        <svg class="social-icon" viewBox="0 0 24 24" aria-hidden="true" focusable="false">
          <path d="M5 3.5v17L19 12 5 3.5Zm2 3.6L15.1 12 7 16.9V7.1Z" />
        </svg>
        <span>Google Play</span>
      </a>
      <a href="mailto:contact.chatgo@gmail.com">contact.chatgo@gmail.com</a>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/@emailjs/browser@4/dist/email.min.js"></script>
    <script src="./script.js"></script>
  </body>
</html>
